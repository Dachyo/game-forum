services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: game-forum-app:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-forum}
      DB_PASSWORD: ${DB_PASSWORD:-forum}
      DB_NAME: ${DB_NAME:-forum}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - forum-net

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-forum}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-forum}
      POSTGRES_DB: ${DB_NAME:-forum}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-forum} -d ${DB_NAME:-forum}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - forum-net

volumes:
  pgdata:

networks:
  forum-net:
    driver: bridge
